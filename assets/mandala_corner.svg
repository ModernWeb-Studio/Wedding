<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.5">
    <!-- Outer arcs -->
    <path d="M0,0 Q150,30 300,0" />
    <path d="M0,0 Q30,150 0,300" />
    <!-- Decorative circles -->
    <circle cx="50" cy="50" r="40"/>
    <circle cx="50" cy="50" r="30"/>
    <circle cx="50" cy="50" r="20"/>
    <circle cx="50" cy="50" r="10"/>
    <!-- Petals -->
    <path d="M50,10 Q65,30 50,50 Q35,30 50,10"/>
    <path d="M90,50 Q70,35 50,50 Q70,65 90,50"/>
    <path d="M50,90 Q35,70 50,50 Q65,70 50,90"/>
    <path d="M10,50 Q30,65 50,50 Q30,35 10,50"/>
    <!-- Diagonal petals -->
    <path d="M78,22 Q60,40 50,50 Q40,40 22,22" transform="rotate(0,50,50)"/>
    <path d="M78,78 Q60,60 50,50 Q40,60 22,78"/>
    <!-- Swirls -->
    <path d="M0,100 Q40,80 80,100 Q120,120 100,160"/>
    <path d="M100,0 Q80,40 100,80 Q120,120 160,100"/>
    <!-- Dots -->
    <circle cx="20" cy="20" r="3" fill="#FFF" fill-opacity="0.3"/>
    <circle cx="80" cy="20" r="3" fill="#FFF" fill-opacity="0.3"/>
    <circle cx="20" cy="80" r="3" fill="#FFF" fill-opacity="0.3"/>
    <circle cx="80" cy="80" r="3" fill="#FFF" fill-opacity="0.3"/>
    <!-- Corner fan -->
    <path d="M0,0 L120,0 Q100,20 80,40 Q60,60 40,80 Q20,100 0,120 Z" fill="url(#mGrad)" stroke="none"/>
    <!-- Decorative arcs from corner -->
    <path d="M0,40 Q20,20 40,0"/>
    <path d="M0,70 Q35,35 70,0"/>
    <path d="M0,110 Q55,55 110,0"/>
    <path d="M0,150 Q75,75 150,0"/>
    <path d="M0,190 Q95,95 190,0"/>
  </g>
</svg>
