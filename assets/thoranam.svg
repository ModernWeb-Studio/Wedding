      <ellipse rx="8" ry="18" fill="url(#leafGrad)" transform="rotate(-20)"/>
      <ellipse rx="8" ry="18" fill="url(#leafGrad)" transform="rotate(0)"/>
      <ellipse rx="8" ry="18" fill="url(#leafGrad)" transform="rotate(20)"/>
      <circle cy="25" r="8" fill="url(#flowerGrad)"/>
    </g>
