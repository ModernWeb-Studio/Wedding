<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120" preserveAspectRatio="none">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="flowerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <!-- Rope -->
  <path d="M0,10 Q150,60 300,35 Q450,10 600,45 Q750,80 900,35 Q1050,10 1200,20" fill="none" stroke="#4E342E" stroke-width="6"/>
  <!-- Mango leaves clusters -->
  <g transform="translate(0,5)">
    <!-- Repeating leaf + flower pattern along the rope -->
