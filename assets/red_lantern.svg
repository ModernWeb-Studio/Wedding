<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 100" width="60" height="100">
  <defs>
    <linearGradient id="lanternGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3333"/>
      <stop offset="40%" stop-color="#CC0000"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <radialGradient id="lanternGlow">
      <stop offset="0%" stop-color="#FF6644" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF3300" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- String -->
  <line x1="30" y1="0" x2="30" y2="20" stroke="#8B6914" stroke-width="2"/>
  <!-- Top cap -->
  <rect x="22" y="18" width="16" height="6" rx="2" fill="#DAA520"/>
  <!-- Lantern body -->
  <ellipse cx="30" cy="52" rx="20" ry="28" fill="url(#lanternGrad)" stroke="#8B0000" stroke-width="1"/>
  <!-- Ribs -->
  <path d="M30,24 L30,80" stroke="#AA0000" stroke-width="0.8" opacity="0.5"/>
  <path d="M14,40 Q30,35 46,40" fill="none" stroke="#AA0000" stroke-width="0.5" opacity="0.4"/>
  <path d="M12,52 Q30,47 48,52" fill="none" stroke="#AA0000" stroke-width="0.5" opacity="0.4"/>
  <path d="M14,64 Q30,59 46,64" fill="none" stroke="#AA0000" stroke-width="0.5" opacity="0.4"/>
  <!-- Highlight -->
  <ellipse cx="22" cy="45" rx="6" ry="12" fill="#FF5555" opacity="0.3"/>
  <!-- Bottom cap -->
  <rect x="24" y="78" width="12" height="5" rx="2" fill="#DAA520"/>
  <!-- Tassel -->
  <line x1="30" y1="83" x2="30" y2="95" stroke="#DAA520" stroke-width="1.5"/>
  <circle cx="30" cy="97" r="3" fill="#FFD700"/>
  <!-- Inner glow -->
  <circle cx="30" cy="52" r="15" fill="url(#lanternGlow)">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
